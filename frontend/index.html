<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Riffle, a swipe-to-decide storefront. Decide as you go." />
    <title>Riffle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&display=swap" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/landing.css" />
    <link rel="stylesheet" href="css/card.css" />
    <link rel="stylesheet" href="css/deck.css" />
</head>
<body>
    <header class="app-header" id="app-header">
        <div class="app-header__inner">
            <a class="brand" href="#/" aria-label="Riffle home">
                <svg class="brand__mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="6" width="13" height="15" rx="2" />
                    <path d="M8 6V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2h-1" />
                </svg>
                <span class="brand__name">RIFFLE</span>
            </a>

            <nav class="app-nav" aria-label="Primary">
                <button class="iconbtn" id="nav-tray" type="button" aria-label="Second Thoughts">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="9" />
                        <path d="M12 7v5l3 2" />
                    </svg>
                    <span class="badge" id="tray-badge" hidden>0</span>
                </button>
                <button class="iconbtn" id="nav-cart" type="button" aria-label="Cart">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                        <path d="M3 6h18" />
                        <path d="M16 10a4 4 0 0 1-8 0" />
                    </svg>
                    <span class="badge" id="cart-badge" hidden>0</span>
                </button>
                <div class="account" id="account"></div>
            </nav>
        </div>
    </header>

    <main class="app-view" id="app-view" tabindex="-1"></main>

    <div class="toast-region" id="toast-region" role="region" aria-live="polite" aria-label="Notifications"></div>
    <div class="modal-root" id="modal-root"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
